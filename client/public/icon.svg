<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Globe outline -->
  <circle cx="256" cy="220" r="150" fill="none" stroke="white" stroke-width="18" opacity="0.25"/>
  <ellipse cx="256" cy="220" rx="70" ry="150" fill="none" stroke="white" stroke-width="18" opacity="0.25"/>
  <line x1="106" y1="220" x2="406" y2="220" stroke="white" stroke-width="18" opacity="0.25"/>
  <line x1="140" y1="130" x2="372" y2="130" stroke="white" stroke-width="14" opacity="0.18"/>
  <line x1="140" y1="310" x2="372" y2="310" stroke="white" stroke-width="14" opacity="0.18"/>
  <!-- Hebrew letters: א (aretz) + ע (ir) stacked -->
  <text x="256" y="260" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="200" font-weight="900"
        fill="white">א</text>
  <!-- Bottom label -->
  <rect x="96" y="400" width="320" height="72" rx="36" fill="white" opacity="0.18"/>
  <text x="256" y="450" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="52" font-weight="700"
        fill="white" letter-spacing="4">ארץ עיר</text>
</svg>
